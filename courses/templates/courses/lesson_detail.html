
{% for lesson in lessons %}
    <h3>Curso: {{lesson.course.name}}</h3>
    <h1>Lição: {{lesson.title}} </h1>

    <p>{{lesson.content}}</p>

    <small>Criado em: {{lesson.created_at}}</small>
{% endfor %}

<h2>Exercicios:</h2>

{% for exercise in exercises %}
    <a href="{% url 'exercise_detail' exercise.id %}">{{exercise.title}}</a>
    <br>
    <br>
{% endfor %}
