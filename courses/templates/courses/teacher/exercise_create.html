{% extends "base.html" %}

{% block title %}
Novo Exercício
{% endblock %}

{% block sidebar %}
    {% include "courses/includes/teacher_sidebar.html" %}
{% endblock %}

{% block content %}

<div class="container-fluid py-4">

    <div class="mb-4">

        <a href="#" class="btn btn-outline-secondary btn-sm mb-3">

            <i class="bi bi-arrow-left me-2"></i>

            Voltar

        </a>

        <h1 class="fw-bold">
            Novo Exercício
        </h1>

        <p class="text-secondary">
            Crie um novo exercício para esta lição.
        </p>

    </div>

    <div class="card shadow-sm border-0">

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Título
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Ex: Exercício 01">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Pergunta
                    </label>

                    <textarea
                        class="form-control"
                        rows="6"
                        placeholder="Digite a pergunta do exercício"></textarea>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Pontuação
                    </label>

                    <input
                        type="number"
                        class="form-control"
                        placeholder="Ex: 10">

                </div>

                <div class="d-flex justify-content-end">

                    <a href="#" class="btn btn-secondary me-2">

                        Cancelar

                    </a>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="bi bi-check-circle me-2"></i>

                        Salvar Exercício

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
