<div class="card shadow-sm border-0">

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Nome do Curso
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Digite o nome do curso">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Descrição
                </label>

                <textarea
                    class="form-control"
                    rows="5"
                    placeholder="Descreva o curso"></textarea>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Token de Acesso
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="ABC123">

                <div class="form-text">
                    Os alunos utilizarão este token para entrar no curso.
                </div>

            </div>

            <div class="d-flex justify-content-end">

                <a href="#" class="btn btn-secondary me-2">

                    Cancelar

                </a>

                <button
                    type="submit"
                    class="btn {{ button_class }}">

                    <i class="bi bi-check-circle me-2"></i>

                    {{ button_text }}

                </button>

            </div>

        </form>

    </div>

</div>
